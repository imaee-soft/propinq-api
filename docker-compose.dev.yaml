name: propinq

services:
  fix-perms:
    image: busybox:1.36
    container_name: propinq-fix-perms
    user: "0:0"
    command: sh -lc "mkdir -p /app/data /app/out /app/state && chown -R ${HOST_UID:-1000}:${HOST_GID:-1000} /app/data /app/out /app/state && ls -ld /app/data /app/out /app/state"
    volumes:
      - data-volume:/app/data
      - out-volume:/app/out
      - state-volume:/app/state
    networks:
      - app-network
    restart: "no"

  api:
    build:
      context: .
      dockerfile: Dockerfile.dev
      target: final
      args:
        UID: "${HOST_UID:-1000}"
        GID: "${HOST_GID:-1000}"
    # No sobreescribimos user aquí: el Dockerfile ya crea appuser con ese UID/GID
    image: propinq-api:latest
    container_name: propinq-api
    ports:
      - "8080:8080"
      - "35729:35729"
    volumes:
      - ./src:/app/src
      - ./pom.xml:/app/pom.xml
      - ./scripts:/app/scripts
      - data-volume:/app/data
      - out-volume:/app/out
      - state-volume:/app/state
      # Cache de Maven para usuario no-root en $HOME
      - maven-cache:/home/appuser/.m2
    depends_on:
      - fix-perms
      - mysql-db
      - mongodb
    environment:
      OSM_STATE_DIR: /app/state
      SPRING_PROFILES_ACTIVE: dev
      SPRING_SQL_INIT_MODE: always

      # MySQL
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-db:3306/propinq?createDatabaseIfNotExist=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD:

      # Mongo
      SPRING_DATA_MONGODB_URI: mongodb://mongo-user:secret@mongodb:27017/propinq?authSource=admin

      # Scheduler de POIs
      POI_SCHEDULER_ENABLED: "true"
      POI_SCHEDULER_CRON: "0 30 3 * * *"
      POI_SCHEDULER_RUN_DOWNLOAD: "true"
      POI_SCHEDULER_RUN_EXTRACTION: "true"
      POI_SCHEDULER_REGION: "south-america/argentina-latest"
      POI_SCHEDULER_PBF_PATH: "/app/data/argentina-latest.osm.pbf"
      POI_SCHEDULER_OUT_DIR: "/app/out"

      # Import a DB
      POI_IMPORT_FILE: "/app/out/pois.geojsonseq"
      POI_IMPORT_BATCH_SIZE: "8000"
      POI_IMPORT_MODE: "REPLACE"
      POI_IMPORT_ID_STRATEGY: "RANDOM"

      # Otros
      CORS_ALLOWED_ORIGINS: http://localhost:4200
      FRONTEND_URL: http://localhost:4200
    networks:
      - app-network
    stdin_open: true
    tty: true

  mysql-db:
    image: mysql:8
    container_name: mysql-db
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: propinq
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - app-network
    ports:
      - "3306:3306"

  mongodb:
    image: mongo:6
    container_name: mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: mongo-user
      MONGO_INITDB_ROOT_PASSWORD: password
      MONGO_INITDB_DATABASE: propinq
    volumes:
      - mongo-data:/data/db
    networks:
      - app-network

volumes:
  mysql-data:
  mongo-data:
  maven-cache:
  data-volume:
  out-volume:
  state-volume:

networks:
  app-network:
    driver: bridge