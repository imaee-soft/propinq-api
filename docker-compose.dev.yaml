services:
  api:
    image: propinq-api:latest
    container_name: propinq-api
    ports:
      - "8080:8080"
      - "35729:35729"
    volumes:
      - ./src:/app/src
      - ./pom.xml:/app/pom.xml
      - maven-cache:/root/.m2
    depends_on:
      - mysql-db
      - mongodb
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE} # .env
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-db:3306/propinq
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD} # .env
      SPRING_DATA_MONGODB_URI: mongodb://${MONGO_USER}:${MONGO_PASSWORD}@mongodb:27017/propinq?authSource=admin
      SECURITY_JWT_KEY: ${SECURITY_JWT_KEY}
      SECURITY_JWT_USER: ${SECURITY_JWT_USER}
      MAIL_HOST: ${MAIL_HOST}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      CLOUDINARY_API_KEY: ${CLOUD_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUD_API_SECRET}
      CLOUDINARY_CLOUD_NAME: ${CLOUD_NAME}

    networks:
      - app-network
    stdin_open: true
    tty: true

  frontend:
    image: propinq-frontend:latest
    container_name: propinq-frontend
    ports:
      - "4200:4200"
    networks:
      - app-network

  mysql-db:
    image: mysql:8
    container_name: mysql-db
    ports:
      - "${MYSQL_PORT}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD} # .env
      MYSQL_DATABASE: ${MYSQL_DATABASE}
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - app-network

  mongodb:
    image: mongo:6
    container_name: mongodb
    ports:
      - "${MONGO_PORT}:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_DATABASE}
    volumes:
      - mongo-data:/data/db
    networks:
      - app-network

volumes:
  mysql-data:
  mongo-data:
  maven-cache:

networks:
  app-network:
    driver: bridge