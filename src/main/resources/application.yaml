spring:
  application:
    name: propinq
  # Deshabilitar la configuración automática de seguridad que causa conflictos
  autoconfigure:
    exclude: org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration
  jpa:
    hibernate:
      ddl-auto: ${DDL_AUTO:update}
    show-sql: true
    open-in-view: false
  datasource:
    # Para uso local, cambiar a jdbc:mysql://mysql:3306/propinq si se usa Docker
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/propinq?createDatabaseIfNotExist=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:password}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    mongodb:
      # Para uso local, cambiar a mongodb:27017 si se usa Docker
      uri: ${MONGO_URL:mongodb://mongo-user:secret@localhost:27017/propinq?authSource=admin}
      username: ${MONGO_USER:mongo-user}
      password: ${MONGO_PASSWORD:secret}
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:your_email@gmail.com}
    password: ${MAIL_PASSWORD:your_password}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

springdoc:
  swagger-ui:
    disable-swagger-default-url: true
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs
frontend:
  url: http://localhost:4200
  
cors:
  allowed-origins: http://localhost:4200

# Configuración de logging para reducir mensajes verbosos
logging:
  level:
    org.springframework.security: WARN
    org.springframework.boot.autoconfigure.security: WARN
    root: INFO