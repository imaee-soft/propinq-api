spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:docker}
  # prod -> application.yaml
  # dev -> application-dev.yaml
  # docker -> application-devDocker.yaml

  devtools:
    restart:
      enabled: ${DEVTOOLS_RESTART_ENABLED:true}
      poll-interval: ${DEVTOOLS_POLL_INTERVAL:1000}
      quiet-period: ${DEVTOOLS_QUIET_PERIOD:400}
      additional-paths: ${DEVTOOLS_ADDITIONAL_PATHS:src/main}
    livereload:
      enabled: ${DEVTOOLS_LIVERELOAD_ENABLED:true}
      port: ${DEVTOOLS_LIVERELOAD_PORT:35729}

  jpa:
    show-sql: ${JPA_SHOW_SQL:true}
    hibernate:
      ddl-auto: ${DDL_AUTO:update}
    defer-datasource-initialization: ${JPA_DEFER_DATASOURCE_INITIALIZATION:true}
    properties:
      hibernate:
        format_sql: ${JPA_FORMAT_SQL:true}

  datasource:
    url: jdbc:mysql://localhost:${MYSQL_PORT:3306}/${MYSQL_DATABASE:propinq}?createDatabaseIfNotExist=true
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD}   # .env
    driver-class-name: com.mysql.cj.jdbc.Driver

  data:
    mongodb:
      uri: mongodb://${MONGO_USER}:${MONGO_PASSWORD}@$localhost:${MONGO_PORT:27017}/${MONGO_DATABASE:propinq}?authSource=${MONGO_AUTH_SOURCE:admin}

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME}  # .env
    password: ${MAIL_PASSWORD}  # .env
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:true}
          starttls:
            enable: ${MAIL_STARTTLS_ENABLE:true}
          timeout: ${MAIL_TIMEOUT:2000}

logging:
  level:
    "[org.springframework.web]": ${LOG_WEB_LEVEL:DEBUG}
    "[org.hibernate.SQL]": ${LOG_HIBERNATE_SQL_LEVEL:DEBUG}
    "[org.hibernate.type.descriptor.sql.BasicBinder]": ${LOG_HIBERNATE_BINDER_LEVEL:TRACE}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200}

frontend:
  url: ${FRONTEND_URL:http://localhost:4200}

cloudinary:
  cloud-name: ${CLOUD_NAME}
  api-key: ${CLOUD_API_KEY}
  api-secret: ${CLOUD_API_SECRET}

springdoc:
  swagger-ui:
    disable-swagger-default-url: ${SWAGGER_DISABLE_DEFAULT_URL:true}
    path: ${SWAGGER_PATH:/docs}
  api-docs:
    path: ${OPENAPI_PATH:/api-docs}

security:
  jwt:
    key: ${SECURITY_JWT_KEY}   # .env
    user: ${SECURITY_JWT_USER} # .env