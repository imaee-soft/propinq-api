spring:

  devtools:
    restart:
      enabled: true
      poll-interval: 1000
      quiet-period: 400
      additional-paths: src/main
    livereload:
      enabled: true
      port: 35729
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: ${DDL_AUTO:update}
    defer-datasource-initialization: true
    properties:
      hibernate:
        format_sql: true
  sql:
    init:
      mode: always
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/propinq?createDatabaseIfNotExist=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:password}
  data:
    mongodb:
      uri: mongodb://mongo-user:secret@mongodb:27017/propinq?authSource=admin
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:propinq.enterprise@gmail.com}
    password: ${MAIL_PASSWORD:mdroysngsnkietif}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          timeout: 2000

logging:
  level:
    "[org.springframework.web]": DEBUG
    "[org.hibernate.SQL]": DEBUG
    "[org.hibernate.type.descriptor.sql.BasicBinder]": TRACE

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200}

frontend:
  url: ${FRONTEND_URL:http://localhost:4200}

cloudinary:
  cloud-name: ${CLOUD_NAME:dlxjcrfie}
  api-key: ${CLOUD_API_KEY:652931284422277}
  api-secret: ${CLOUD_API_SECRET:AMR7X_QdwtjgM8mQ21otREwSRsE}

springdoc:
  swagger-ui:
    disable-swagger-default-url: true
    path: /

security:
  jwt:
    key: ${SECURITY_JWT_KEY:03ac674216f3e15c761ee1a5e255f067953623c8b388b4459e13f978d7c846f4}
    user: ${SECURITY_JWT_USER:AUTH0_USER}